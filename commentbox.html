<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css"
    href="https://www.htmlcommentbox.com/static/skins/bootstrap/twitter-bootstrap.css?v=0" />
  <style>
    body { margin: 0; padding: 8px; background: transparent; }
  </style>
</head>
<body>

  <div id="HCB_comment_box">
    <a href="http://www.htmlcommentbox.com">Comment Box</a> is loading comments...
  </div>

  <script type="text/javascript">
    if (!window.hcb_user) { window.hcb_user = {}; }
    // Read the page ID passed in via URL parameter
    const params = new URLSearchParams(window.location.search);
    const pageId = params.get("page");
    if (pageId) { window.hcb_user.PAGE = decodeURIComponent(pageId); }
  </script>

  <script type="text/javascript" id="hcb">
    if (!window.hcb_user) { hcb_user = {}; }
    (function() {
      var s = document.createElement("script"),
          l = hcb_user.PAGE || ("" + window.location).replace(/'/g, "%27"),
          h = "https://www.htmlcommentbox.com";
      s.setAttribute("type", "text/javascript");
      s.setAttribute("src", h + "/jread?page=" + encodeURIComponent(l).replace("+", "%2B")
        + "&opts=16798&num=10&ts=1776106399998");
      document.head.appendChild(s);
    })();
  </script>

</body>
</html>
